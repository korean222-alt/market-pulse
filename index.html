om:8px}.thr-btn{padding:6px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;border-width:1px;border-style:solid}.reason-item{background:#0f1524;border-radius:8px;padding:9px 12px;border-left-width:3px;border-left-style:solid;margin-bottom:6px}.small{font-size:10px;color:#6b7fa3;line-height:1.5}.loading{padding:20px;text-align:center;color:#6b7fa3}.error-pre{white-space:pre-wrap;background:#0f1524;border:1px solid #1e2d47;border-radius:10px;padding:10px;font-size:10px;color:#9ab4d8;line-height:1.5;max-height:140px;overflow:auto}@media(max-width:420px){.grid3{grid-template-columns:1fr}.chart-box{height:135px}}
</style>

<script>
const C={bg:'#080c14',surface:'#0f1524',card:'#131c2e',border:'#1e2d47',gold:'#f5c542',red:'#ff3b5c',blue:'#2f80ed',green:'#1edd8a',orange:'#ff9f43',text:'#dce4f0',sub:'#6b7fa3'};
let DATA=null, foreignSel=null, foreignChart=null, creditChart=null, curThr=80;

const SAMPLE_DATA={
  status:'sample', generatedAt:'мХДмІБ мЮРлПЩмИШмІС м†Д', tradeDate:'-', source:'sample',
  notice:'GitHub Actionsл•Љ мИШлПЩ мЛ§нЦЙнХШк±∞лВШ нПЙмЭЉ 19:00 мЮРлПЩ мЛ§нЦЙ нЫД мЛ§м†Ь лН∞мЭінД∞л°Ь л∞ФлАЭлЛИлЛ§.',
  alert:{level:1,label:'мГШнФМ',message:'мХДмІБ latest.json мЛ§лН∞мЭінД∞к∞А мГЭмД±лРШмІА мХКмХШмКµлЛИлЛ§.'},
  market:[
    {name:'KOSPI',code:'мљФмК§нФЉ м†Дм≤і',price:'-',change:'-',flow:{foreign:0,institution:0,individual:0},maxAbs:1},
    {name:'мВЉмД±м†ДмЮР',code:'005930',price:'-',change:'-',flow:{foreign:0,institution:0,individual:0},maxAbs:1,foreignRatio:null,foreignPctOfHigh:null},
    {name:'SKнХШмЭілЛЙмК§',code:'000660',price:'-',change:'-',flow:{foreign:0,institution:0,individual:0},maxAbs:1,foreignRatio:null,foreignPctOfHigh:null}
  ],
  divergence:{score:0,level:1,details:{sellDays:0,individualTotalEok:0,creditGrowthPct:null,avgRatioDropPctp:null},availableWeights:{}},
  weekly:[], foreign:{}, credit:{available:false,message:'мХДмІБ мИШмІС м†ДмЮЕлЛИлЛ§.',history:[]}, backtest:{available:false,thresholds:[],cases:[],note:'мХДмІБ мИШмІС м†ДмЮЕлЛИлЛ§.'}, errors:[]
};

function showPage(id,btn){document.querySelectorAll('.content').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');btn.classList.add('active');}
const fmt=n=>{n=Number(n||0);return (n>0?'+':'')+n.toLocaleString(undefined,{maximumFractionDigits:1})};
const levelColor=l=>l>=4?C.red:l>=3?C.orange:l>=2?C.gold:C.green;
const levelBadge=l=>l>=4?'badge-red':l>=3?'badge-orange':l>=2?'badge-gold':'badge-green';
const safe=(v,d='-')=>(v===null||v===undefined||Number.isNaN(v)?d:v);

async function loadData(){
  try{
    const res=await fetch('data/latest.json?v='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw new Error('latest.json not found');
    DATA=await res.json();
  }catch(e){
    DATA={...SAMPLE_DATA, errors:[String(e)]};
  }
  renderAll();
}

function renderAll(){
  document.getElementById('top-sub').textContent=`${DATA.tradeDate} мЮ•лІИк∞Р лН∞мЭінД∞ ¬Ј ${DATA.generatedAt}`;
  const badge=document.getElementById('status-badge');
  badge.textContent=DATA.status==='ok'?'OK':DATA.status==='partial'?'PARTIAL':'SAMPLE';
  badge.className='badge mono '+(DATA.status==='ok'?'badge-green':DATA.status==='partial'?'badge-orange':'badge-gold');
  renderDashboard(DATA);renderForeign(DATA);renderCredit(DATA);renderBacktest(DATA,80);
}

function renderDashboard(d){
  const div=d.divergence||{score:0,level:1,details:{}};
  const lvl=Number(div.level||1), color=levelColor(lvl);
  const details=div.details||{};
  const cards=(d.market||[]).map(stockCard).join('');
  const weekly=(d.weekly||[]).map(r=>`<tr style="background:${r.danger?'rgba(255,59,92,.06)':'transparent'}"><td style="color:${r.danger?C.red:C.text};font-weight:${r.today?700:400}">${r.date}${r.danger?' вЪ†пЄП':''}</td><td style="color:${Number(r.foreign)<0?C.red:C.green}">${fmt(r.foreign)}</td><td style="color:${Number(r.individual)>=0?C.green:C.red}">${fmt(r.individual)}</td><td style="font-weight:700;color:${levelColor(r.score>=85?4:r.score>=70?3:r.score>=50?2:1)}">${safe(r.score)}</td></tr>`).join('') || `<tr><td colspan="4" style="text-align:center;color:${C.sub}">мИШмІСлРЬ мµЬкЈЉ мИШкЄЙ лН∞мЭінД∞ мЧЖмЭМ</td></tr>`;
  const errors=(d.errors||[]).length?`<div class="sec">вЪ†пЄП мИШмІС л°ЬкЈЄ</div><div class="error-pre">${d.errors.map(escapeHtml).join('\n')}</div>`:'';
  document.getElementById('main-root').innerHTML=`
    <div class="disc-box">вЪ†пЄП <b style="color:#c2d6f0">нИђл™Е к≥†мІА</b> вАФ ${escapeHtml(d.notice||'нИђмЮР кґМмЬ†к∞А мХДлЛМ м∞Єк≥†мЪ© мІАнСЬмЮЕлЛИлЛ§.')}<br>лН∞мЭінД∞ мЖМмК§: ${escapeHtml(d.source||'-')}</div>
    <div class="alert-box">
      <div class="${levelBadge(lvl)} badge" style="margin-bottom:8px">LEVEL ${lvl} ${escapeHtml(d.alert?.label||'')}</div>
      <div style="font-size:14px;font-weight:700;color:${color};margin-bottom:6px;line-height:1.4">${escapeHtml(d.alert?.message||'')}</div>
      <div class="grid2">
        ${metricBox('мЩЄмЭЄ мЧ∞мЖН мИЬлІ§лПД',`${safe(details.sellDays,0)}мЭЉ`,C.red,'мµЬкЈЉ к±∞лЮШмЭЉ кЄ∞м§А')}
        ${metricBox('к∞ЬмЭЄ лИДм†Б мИЬлІ§мИШ',`${fmt(details.individualTotalEok)}мЦµ`,C.green,'мµЬкЈЉ 30к±∞лЮШмЭЉ кЄ∞м§А')}
        ${metricBox('мЛ†мЪ©мЮФк≥† м¶Эк∞АмЬ®',details.creditGrowthPct==null?'лѓЄмИШмІС':`${fmt(details.creditGrowthPct)}%`,C.orange,'мИШмІС к∞АлК• мЛЬ л∞ШмШБ')}
        ${metricBox('мІАлґДмЬ® нПЙкЈ† нХШлЭљнП≠',details.avgRatioDropPctp==null?'лѓЄмИШмІС':`${safe(details.avgRatioDropPctp)}%p`,C.gold,'мВЉм†Д¬ЈнХШлЛЙ нПЙкЈ†')}
      </div>
    </div>
    <div id="stock-cards">${cards}</div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:3px">вЪЦпЄП мИШкЄЙ лЛ§мЭіл≤Дм†ДмК§ к∞ХлПД</div>
      <div class="small">мВђмЪ© к∞АлК•нХЬ мІАнСЬлІМ к∞Ам§СмєШл•Љ мЮђл∞∞лґДнХ©лЛИлЛ§. мЛ†мЪ©мЮФк≥†/мІАлґДмЬ® мИШмІС мЛ§нМ® мЛЬ м†РмИШ мЛ†лҐ∞лПДлКФ лВЃмХДмІСлЛИлЛ§.</div>
      <div class="gauge-wrap"><div class="gauge-needle" style="left:${Math.max(0,Math.min(100,div.score||0))}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:${C.sub}"><span>0 мХИм†Д</span><span>40</span><span>70 м£ЉмЭШ</span><span>85 мЬДнЧШ</span><span>100</span></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px"><div><span class="mono" style="font-size:36px;font-weight:700;color:${color}">${safe(div.score,0)}</span><span style="font-size:14px;color:${C.sub}">/100</span></div><div class="small" style="text-align:right">к∞Ам§СмєШ<br>${weightsText(div.availableWeights)}</div></div>
    </div>
    <div class="sec">рЯУЕ мµЬкЈЉ 7к±∞лЮШмЭЉ мИШкЄЙ (лЛ®мЬД: мЦµмЫР)</div>
    <div style="overflow-x:auto;border-radius:10px;border:1px solid #1e2d47;margin-bottom:10px"><table><thead><tr><th>мЭЉмЮР</th><th>мЩЄмЭЄ</th><th>к∞ЬмЭЄ</th><th>м†РмИШ</th></tr></thead><tbody>${weekly}</tbody></table></div>
    <div class="help-box"><div style="color:${C.gold};font-size:12px;font-weight:700;margin-bottom:6px">рЯТ° мЭі нЩФл©імЭі л≠Ш л≥імЧђм£ЉлВШмЪФ?</div><div class="small" style="color:#c0c8d8">мЩЄкµ≠мЭЄмЭі нМФк≥† к∞ЬмЭЄмЭі л∞ЫмХДлВілКФ нЭРл¶ДмЭі к∞ХнХімІИмИШл°Э лЛ§мЭіл≤Дм†ДмК§ м†РмИШк∞А мШђлЭЉк∞СлЛИлЛ§. мЮ•лІИк∞Р нЫД мЮРлПЩ к∞±мЛ†лРШлКФ м∞Єк≥†мЪ© мЛЬмЮ• мШ®лПДк≥ДмЮЕлЛИлЛ§.</div></div>
    ${errors}
  `;
}

function stockCard(st){
  const f=st.flow||{}, max=Math.max(1,Number(st.maxAbs||1));
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-size:13px;font-weight:700">${escapeHtml(st.name)}</div><div class="mono" style="font-size:10px;color:${C.sub};margin-top:2px">${escapeHtml(st.code)}</div></div><div><div class="mono" style="font-size:20px;font-weight:700;color:${C.text};text-align:right">${escapeHtml(st.price||'-')}</div><div style="font-size:11px;color:${String(st.change||'').includes('-')?C.red:C.green};margin-top:2px;text-align:right">${escapeHtml(st.change||'-')}</div></div></div>${flowRow('мЩЄмЭЄ',f.foreign,max)}${flowRow('кЄ∞кіА',f.institution,max)}${flowRow('к∞ЬмЭЄ',f.individual,max)}${st.foreignRatio!=null?`<div style="margin-top:8px;padding-top:7px;border-top:1px solid rgba(255,255,255,.05);font-size:10px;color:${C.sub};display:flex;justify-content:space-between"><span>мЩЄмЭЄмІАлґДмЬ®</span><span class="mono" style="color:${C.gold};font-weight:700">${st.foreignRatio}% <span style="color:${C.sub};font-weight:400;font-size:10px">к≥†м†РжѓФ ${safe(st.foreignPctOfHigh)}%</span></span></div>`:''}</div>`;
}
function flowRow(label,net,maxAbs){net=Number(net||0);const buy=net>=0,pct=Math.min(100,Math.round(Math.abs(net)/maxAbs*100));return`<div class="flow-row"><span style="font-size:10px;color:${C.sub}">${label}</span><div class="flow-bar-wrap"><div class="flow-bar" style="width:${pct}%;background:${buy?C.red:C.blue}">${pct>34?(buy?'лІ§мИШ':'лІ§лПД'):''}</div></div><span class="mono" style="font-size:11px;font-weight:700;text-align:right;color:${buy?C.green:C.red}">${fmt(net)}мЦµ</span></div>`}
function metricBox(title,val,color,sub){return`<div style="background:rgba(0,0,0,.35);padding:8px 10px;border-radius:8px"><div class="mono" style="font-size:15px;font-weight:700;color:${color}">${escapeHtml(String(val))}</div><div style="font-size:10px;color:#a09098;margin-top:3px">${title}</div><div style="font-size:9px;color:#887080;margin-top:3px">${sub}</div></div>`}
function weightsText(w){if(!w||Object.keys(w).length===0)return'мЧЖмЭМ';const map={foreign_sell_days:'мЩЄмЭЄ',indiv_net_buy:'к∞ЬмЭЄ',credit_growth:'мЛ†мЪ©',ratio_drop:'мІАлґДмЬ®'};return Object.entries(w).map(([k,v])=>`${map[k]||k} ${Math.round(v*100)}%`).join(' ¬Ј ')}

function renderForeign(d){
  const entries=Object.entries(d.foreign||{});
  if(!entries.length){document.getElementById('foreign-toggle').innerHTML='';document.getElementById('foreign-content').innerHTML=`<div class="card small">мЩЄмЭЄмІАлґДмЬ® лН∞мЭінД∞ мЧЖмЭМ</div>`;return;}
  if(!foreignSel || !d.foreign[foreignSel]) foreignSel=entries[0][0];
  document.getElementById('foreign-toggle').innerHTML=entries.map(([k,v])=>`<button class="stock-btn" onclick="foreignSel='${k}';renderForeign(DATA)" style="border-color:${foreignSel===k?C.gold:C.border};color:${foreignSel===k?C.gold:C.sub};font-weight:700;font-size:12px">${escapeHtml(v.name)}</button>`).join('');
  const st=d.foreign[foreignSel];
  if(!st.available){document.getElementById('foreign-content').innerHTML=`<div class="card"><div style="font-weight:700;margin-bottom:6px">${escapeHtml(st.name)} мЩЄмЭЄмІАлґДмЬ®</div><div class="small">мИШмІС лґИк∞А лШРлКФ лН∞мЭінД∞ мЧЖмЭМ</div></div>`;return;}
  const pct=Number(st.pctOfHigh||0), dc=pct>=97?C.red:pct>=92?C.orange:C.gold;
  document.getElementById('foreign-content').innerHTML=`
    <div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px"><div><div style="font-size:11px;color:${C.sub};margin-bottom:4px">${escapeHtml(st.name)} (${st.code})</div><div class="mono" style="font-size:38px;font-weight:700;color:${C.gold};letter-spacing:-1px;line-height:1">${safe(st.ratio)}<span style="font-size:18px">%</span></div><div class="small">м°∞нЪМкЄ∞к∞Д к≥†м†Р <b style="color:${C.text}">${safe(st.high)}%</b> (${safe(st.highDate)}) лМАлєД</div></div><div style="text-align:right"><div class="mono" style="font-size:32px;font-weight:900;color:${dc};line-height:1">${safe(st.pctOfHigh)}<span style="font-size:14px">%</span></div><div class="small">к≥†м†Р лМАлєД</div></div></div><div class="prog-bar-wrap"><div class="prog-bar" style="width:${Math.min(100,pct)}%"></div></div></div>
    <div class="card"><div class="small" style="margin-bottom:8px">мµЬкЈЉ мЩЄмЭЄмІАлґДмЬ® мґФмЭі</div><div class="chart-box"><canvas id="foreignChart"></canvas></div></div>
    <div class="sec">рЯУН м£ЉмЪФ мЛЬм†Р</div>${(st.history||[]).map(h=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)"><div style="width:3px;height:34px;background:${h.note?.includes('к≥†м†Р')?C.red:C.gold};border-radius:2px"></div><div style="flex:1"><div class="mono small">${escapeHtml(h.period)}</div><div style="font-size:12px;font-weight:700">${escapeHtml(h.note)}</div></div><div class="mono" style="font-size:16px;font-weight:700;color:${h.note?.includes('к≥†м†Р')?C.red:C.gold}">${safe(h.ratio)}%</div></div>`).join('')}`;
  if(foreignChart) foreignChart.destroy();
  const ctx=document.getElementById('foreignChart').getContext('2d');
  foreignChart=new Chart(ctx,{type:'line',data:{labels:st.labels||[],datasets:[{label:'мЩЄмЭЄмІАлґДмЬ®',data:st.confirmed||[],borderColor:C.gold,borderWidth:2,pointRadius:2,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:C.card,titleColor:C.sub,bodyColor:C.text,borderColor:C.border,borderWidth:1}},scales:{x:{ticks:{color:C.sub,font:{size:8}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:C.sub,font:{size:8},callback:v=>v.toFixed(1)+'%'},grid:{color:'rgba(255,255,255,.04)'}}}});
}

function renderCredit(d){
  const cr=d.credit||{};
  if(!cr.available){document.getElementById('credit-root').innerHTML=`<div class="disc-box">мЛ†мЪ©мЮФк≥†лКФ к∞АмІЬк∞ТмЭД лД£мІА мХКмКµлЛИлЛ§. мИШмІС мЛ§нМ® мЛЬ мХДлЮШм≤ШлЯЉ нСЬмЛЬнХ©лЛИлЛ§.</div><div class="card"><div style="font-size:14px;font-weight:700;color:${C.orange};margin-bottom:6px">рЯТ≥ мЛ†мЪ©мЮФк≥† мИШмІС лґИк∞А</div><div class="small">${escapeHtml(cr.message||'лН∞мЭінД∞ мЧЖмЭМ')}</div>${cr.tried?`<div class="small" style="margin-top:8px">мЛЬлПДнХЬ нХ®мИШ: ${escapeHtml(cr.tried.join(', ')||'-')}</div>`:''}</div>`;return;}
  const hist=cr.history||[];
  document.getElementById('credit-root').innerHTML=`
    <div class="grid3">${metricBox('нШДмЮђ мЛ†мЪ©мЮФк≥†',`${safe(cr.current)} ${escapeHtml(cr.unit||'')}`,C.gold,escapeHtml(cr.source||''))}${metricBox('30мЭЉ м¶Эк∞АмЬ®',cr.growth30d==null?'N/A':`${fmt(cr.growth30d)}%`,C.red,'мµЬкЈЉ мЮРл£М кЄ∞м§А')}${metricBox('мµЬкЈЉ к≥†м†Р лМАлєД',cr.pctOfHigh==null?'N/A':`${safe(cr.pctOfHigh)}%`,C.orange,'мИШмІС кµђк∞Д кЄ∞м§А')}</div>
    <div class="card"><div class="small" style="margin-bottom:8px">мЛ†мЪ©мЮФк≥† мґФмЭі</div><div class="chart-box"><canvas id="creditChart"></canvas></div></div>
    <div class="help-box"><div style="color:${C.gold};font-size:12px;font-weight:700;margin-bottom:6px">рЯТ° мЛ†мЪ©мЮФк≥† нГ≠</div><div class="small" style="color:#c0c8d8">мЛ†мЪ©мЮФк≥†лКФ л≥інЖµ мІАмЧ∞ лН∞мЭінД∞мЮЕлЛИлЛ§. мИШмІС лЛ®мЬДк∞А мЫРмЮРл£Мл°Ь нСЬмЛЬлРШл©і мЫРм≤Ь мїђлЯЉ лЛ®мЬД нЩХмЭЄмЭі нХДмЪФнХ©лЛИлЛ§.</div></div>`;
  if(creditChart) creditChart.destroy();
  const ctx=document.getElementById('creditChart').getContext('2d');
  creditChart=new Chart(ctx,{type:'line',data:{labels:hist.map(x=>x.date),datasets:[{label:'мЛ†мЪ©мЮФк≥†',data:hist.map(x=>x.balance),borderColor:C.gold,backgroundColor:'rgba(245,197,66,.08)',fill:true,borderWidth:2,pointRadius:3,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:C.card,titleColor:C.sub,bodyColor:C.text,borderColor:C.border,borderWidth:1}},scales:{x:{ticks:{color:C.sub,font:{size:8}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:C.sub,font:{size:8}},grid:{color:'rgba(255,255,255,.04)'}}}});
}

function renderBacktest(d,thr){
  curThr=thr; const bt=d.backtest||{};
  if(!bt.available){document.getElementById('backtest-root').innerHTML=`<div class="card"><div style="font-weight:700;color:${C.orange};margin-bottom:6px">л∞±нЕМмК§нКЄ лН∞мЭінД∞ лґАм°±</div><div class="small">${escapeHtml(bt.note||'мИШмІС нЫД нСЬмЛЬлР©лЛИлЛ§.')}</div></div>`;return;}
  const td=bt.thresholds||[], sel=td.find(x=>x.t===thr)||td[0]||{t:thr,n:0,hit:0,avg:0};
  const cases=(bt.cases||[]).filter(c=>Number(c.score)>=thr);
  document.getElementById('backtest-root').innerHTML=`
    <div class="disc-box">${escapeHtml(bt.note||'к∞ДмЭі л∞±нЕМмК§нКЄмЮЕлЛИлЛ§.')}</div>
    <div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:10px">рЯОЫпЄП м†РмИШ кЄ∞м§А л∞ФкњФл≥ікЄ∞</div><div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap">${td.map(x=>`<button class="thr-btn" onclick="renderBacktest(DATA,${x.t})" style="border-color:${thr===x.t?C.gold:C.border};background:${thr===x.t?'rgba(245,197,66,.15)':C.surface};color:${thr===x.t?C.gold:C.sub};font-weight:${thr===x.t?700:400}">${x.t}м†Р</button>`).join('')}</div><div class="grid3">${metricBox('мЛ†нШЄ л∞ЬмГЭ',`${sel.n}нЪМ`,C.gold,'нСЬл≥Є')}${metricBox('10мЭЉ лВі нХШлЭљ',`${sel.hit}%`,C.green,'нЩХл•†')}${metricBox('нПЙкЈ† 10мЭЉ мИШмЭµл•†',`${fmt(sel.avg)}%`,C.red,'нПЙкЈ†')}</div></div>
    <div class="sec">рЯУЦ ${thr}м†РвЖС к≥Љк±∞ мВђл°А</div>${cases.length?cases.map(c=>`<div class="case-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div class="mono small">${escapeHtml(c.date)}</div><div style="font-size:13px;font-weight:700;margin-top:2px">${escapeHtml(c.note||'мЛ†нШЄ')}</div></div><span class="mono" style="font-size:12px;font-weight:700;padding:3px 10px;border-radius:8px;background:rgba(255,59,92,.15);color:${C.red}">м†РмИШ ${safe(c.score)}</span></div><div class="grid2">${caseRet(c.r5,'5мЭЉ нЫД')}${caseRet(c.r10,'10мЭЉ нЫД')}</div></div>`).join(''):`<div class="card small">нХілЛє кЄ∞м§АмЧРмДЬлКФ мВђл°А мЧЖмЭМ</div>`}`;
}
function caseRet(r,label){const val=r==null?'N/A':`${r>0?'+':''}${r}%`;return`<div style="background:${C.surface};border-radius:8px;padding:8px 10px;text-align:center"><div class="mono" style="font-size:20px;font-weight:700;color:${Number(r)<0?C.red:C.green}">${val}</div><div class="small">${label} мИШмЭµл•†</div></div>`}
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

loadData();
</script>
